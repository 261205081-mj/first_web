<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>同じ位置に画像を重ねる</title>
</head>
<body>
<section>
<div style="position: relative; width: 480px; height: 374px;">
    <img src="./img/bg0.png" style="position: absolute; left: 0; top: 0;">
    <img src="./img/butterfly.gif" style="position: absolute; left: 180px; top: 350px; width: 70px; height: auto;">
    <img src="./img/butterfly.gif" style="position: absolute; left: 400px; top: 300px; width: 70px; height: auto;">
    <img src="./img/butterfly.gif" style="position: absolute; left: 600px; top: 370px; width: 70px; height: auto;">
</div>
<div style="position: absolute; color: rgb(225, 86, 109); font-size: 25px; font-weight: 800; top: 50px; left: 30px; background-color: rgba(255, 255, 255, 0.5);">
<p style="margin-block-start: 10px; margin-block-end: 0px; margin-left: 10px;">ぽかぽか陽気の穏やかな朝</p>
<p style="margin-block-start: 0; margin-block-end: 10px; margin-left: 10px;">花畑では、蝶々がのんびり飛んでいます</p>
</div>
</section>

</body>
</html>
